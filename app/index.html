<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Metro Perto — Lisboa</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  :root{
    --azul:#6699cc; --amarela:#ffcc00; --verde:#00cc99; --vermelha:#ff3366;
    --bg:#0e1116; --card:#1a1f29; --text:#f2f4f8; --muted:#9aa4b2;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
            background:var(--bg);color:var(--text)}
  #map{position:absolute;inset:0}
  .topbar{position:absolute;top:0;left:0;right:0;z-index:1000;padding:10px;
          display:flex;gap:8px;background:linear-gradient(#0e1116ee,#0e111600)}
  .search{flex:1;display:flex;background:var(--card);border-radius:12px;overflow:hidden;
          box-shadow:0 4px 16px #0006}
  .search input{flex:1;border:0;background:transparent;color:var(--text);padding:12px 14px;font-size:16px;outline:none}
  .search input::placeholder{color:var(--muted)}
  .search button{border:0;background:transparent;color:var(--muted);padding:0 14px;font-size:18px;cursor:pointer}
  .locbtn{width:48px;border:0;border-radius:12px;background:var(--card);color:var(--text);
          font-size:20px;cursor:pointer;box-shadow:0 4px 16px #0006}
  .locbtn:active{transform:scale(.94)}
  .card{position:absolute;left:10px;right:10px;bottom:10px;z-index:1000;background:var(--card);
        border-radius:16px;padding:16px 18px;box-shadow:0 8px 30px #0008;transform:translateY(150%);
        transition:transform .3s ease}
  .card.show{transform:none}
  .card h2{margin:0 0 2px;font-size:20px}
  .card .dist{color:var(--muted);font-size:14px;margin-bottom:10px}
  .lines{display:flex;flex-wrap:wrap;gap:6px}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;
        font-size:13px;font-weight:600;color:#111}
  .exits{margin-top:12px;max-height:34vh;overflow-y:auto}
  .exits h3{margin:0 0 6px;font-size:13px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .exit-row{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-top:1px solid #ffffff12;cursor:pointer}
  .exit-row:first-of-type{border-top:0}
  .exit-row .n{flex:0 0 20px;height:20px;border-radius:6px;background:#2a3140;color:var(--muted);
               font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px}
  .exit-row .t{flex:1;font-size:13.5px;line-height:1.3}
  .exit-row .wc{font-size:12px;flex:0 0 auto;margin-top:1px}
  .exit-row:active{opacity:.6}
  .close{position:absolute;top:12px;right:14px;color:var(--muted);cursor:pointer;font-size:20px;border:0;background:0}
  .hint{position:absolute;bottom:10px;left:10px;right:10px;z-index:900;text-align:center;
        color:var(--muted);font-size:13px}
  .leaflet-container{background:#0e1116}
  /* marcador da estação */
  .st-dot{border-radius:50%;border:2.5px solid #0e1116;box-shadow:0 0 0 1.5px #ffffff55}
  /* marcador "eu" */
  .me{width:18px;height:18px;border-radius:50%;background:#3b82f6;border:3px solid #fff;
      box-shadow:0 0 0 6px #3b82f655}
  /* marcador de saída */
  .exit-dot{width:14px;height:14px;background:#fff;border:2px solid #2a3140;border-radius:4px;
            display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px #0007}
  .exit-dot::after{content:'';width:5px;height:5px;border-right:2px solid #2a3140;
                   border-bottom:2px solid #2a3140;transform:rotate(-45deg);margin-left:-1px}
  .exit-num{position:absolute;top:-6px;right:-6px;background:#2a3140;color:#fff;font-size:9px;
            font-weight:700;width:14px;height:14px;border-radius:50%;display:flex;
            align-items:center;justify-content:center;border:1px solid #fff}
  .leaflet-tooltip.exit-tip{background:#1a1f29;color:#f2f4f8;border:0;box-shadow:0 3px 12px #0009;
            font-size:12px;padding:5px 9px;border-radius:8px}
  .leaflet-tooltip.exit-tip::before{border-top-color:#1a1f29}
</style>
</head>
<body>
<div id="map"></div>

<div class="topbar">
  <div class="search">
    <input id="q" placeholder="Escreve uma morada…" autocomplete="off">
    <button id="go" title="Procurar">➜</button>
  </div>
  <button class="locbtn" id="loc" title="A minha localização">◎</button>
</div>

<div class="hint" id="hint">Toca em ◎ para usares a tua localização, ou escreve uma morada.</div>

<div class="card" id="card">
  <button class="close" id="close">✕</button>
  <h2 id="c-name">—</h2>
  <div class="dist" id="c-dist"></div>
  <div class="lines" id="c-lines"></div>
  <div class="exits" id="c-exits"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="stations.js"></script>
<script src="exits.js"></script>
<script>
const LINE_COLOR = {Azul:'#6699cc',Amarela:'#ffcc00',Verde:'#00cc99',Vermelha:'#ff3366'};

const map = L.map('map',{zoomControl:false}).setView([38.736,-9.142],12);
L.control.zoom({position:'bottomright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'© OpenStreetMap © CARTO', maxZoom:19
}).addTo(map);

// desenhar estações
const stationMarkers = [];
for(const s of STATIONS){
  const cores = s.linhas.map(l=>l.cor);
  const bg = cores.length===1 ? cores[0]
           : `conic-gradient(${cores.map((c,i)=>`${c} ${i/cores.length*360}deg ${(i+1)/cores.length*360}deg`).join(',')})`;
  const size = s.linhas.length>1 ? 15 : 11;
  const icon = L.divIcon({className:'',iconSize:[size,size],
    html:`<div class="st-dot" style="width:${size}px;height:${size}px;background:${bg}"></div>`});
  const m = L.marker([s.lat,s.lon],{icon}).addTo(map);
  m.on('click',()=>showStation(s,null));
  stationMarkers.push({s,m});
}

let meMarker=null, lineToStation=null;
const exitLayer=L.layerGroup().addTo(map);
const WC_ICON={yes:'♿',limited:'♿',no:'',null:''};

function haversine(a,b,c,d){
  const R=6371000,r=x=>x*Math.PI/180;
  const dp=r(c-a),dl=r(d-b);
  const x=Math.sin(dp/2)**2+Math.cos(r(a))*Math.cos(r(c))*Math.sin(dl/2)**2;
  return 2*R*Math.asin(Math.sqrt(x));
}
function nearest(lat,lon){
  let best=null,bd=Infinity;
  for(const s of STATIONS){const d=haversine(lat,lon,s.lat,s.lon);if(d<bd){bd=d;best=s;}}
  return {s:best,dist:Math.round(bd)};
}

let exitMarkers=[];
function clearExits(){
  exitLayer.clearLayers();
  exitMarkers=[];
}

function renderExits(s){
  clearExits();
  const exits=(window.EXITS&&window.EXITS[s.id])||[];
  // marcadores no mapa
  exits.forEach((ex,i)=>{
    const icon=L.divIcon({className:'',iconSize:[14,14],iconAnchor:[7,7],
      html:`<div style="position:relative"><div class="exit-dot"></div><span class="exit-num">${i+1}</span></div>`});
    const m=L.marker([ex.lat,ex.lon],{icon,zIndexOffset:500}).addTo(exitLayer);
    m.bindTooltip(`${i+1}. ${ex.nome}${ex.acesso_cadeira==='yes'?' ♿':''}`,
                  {direction:'top',className:'exit-tip',offset:[0,-8]});
    m.on('click',()=>{map.panTo([ex.lat,ex.lon]);m.openTooltip();});
    exitMarkers.push(m);
  });
  // lista no painel
  const box=document.getElementById('c-exits');box.innerHTML='';
  if(!exits.length) return;
  const h=document.createElement('h3');
  h.textContent=`${exits.length} saída${exits.length>1?'s':''}`;box.appendChild(h);
  exits.forEach((ex,i)=>{
    const row=document.createElement('div');row.className='exit-row';
    const wc=WC_ICON[ex.acesso_cadeira]||'';
    row.innerHTML=`<span class="n">${i+1}</span>`+
      `<span class="t">${ex.nome}${ex.elevador?' · elevador':''}</span>`+
      (wc?`<span class="wc" title="acesso cadeira de rodas">${wc}</span>`:'');
    row.onclick=()=>{const m=exitMarkers[i];if(m){map.setView([ex.lat,ex.lon],17);m.openTooltip();}};
    box.appendChild(row);
  });
}

function showStation(s,dist){
  document.getElementById('hint').style.display='none';
  document.getElementById('c-name').textContent=s.nome;
  const walk=dist!=null?` · ~${Math.round(dist/80)} min a pé`:'';
  document.getElementById('c-dist').textContent=dist!=null?`${dist} m de distância${walk}`:'Estação';
  const wrap=document.getElementById('c-lines');wrap.innerHTML='';
  for(const l of s.linhas){
    const p=document.createElement('span');p.className='pill';
    p.style.background=l.cor;p.textContent=l.nome;wrap.appendChild(p);
  }
  renderExits(s);
  document.getElementById('card').classList.add('show');
}

function setMe(lat,lon,zoom=15){
  if(meMarker) map.removeLayer(meMarker);
  meMarker=L.marker([lat,lon],{icon:L.divIcon({className:'',html:'<div class="me"></div>',iconSize:[18,18]})}).addTo(map);
  const {s,dist}=nearest(lat,lon);
  if(lineToStation) map.removeLayer(lineToStation);
  lineToStation=L.polyline([[lat,lon],[s.lat,s.lon]],{color:'#fff',weight:2,dashArray:'4 6',opacity:.6}).addTo(map);
  map.fitBounds([[lat,lon],[s.lat,s.lon]],{padding:[80,80],maxZoom:16});
  showStation(s,dist);
}

// localização
document.getElementById('loc').onclick=()=>{
  if(!navigator.geolocation){alert('Geolocalização não suportada');return;}
  navigator.geolocation.getCurrentPosition(
    p=>setMe(p.coords.latitude,p.coords.longitude),
    ()=>alert('Não consegui obter a localização. Verifica as permissões.'),
    {enableHighAccuracy:true,timeout:10000});
};

// morada -> geocoding
async function search(){
  const q=document.getElementById('q').value.trim();
  if(!q) return;
  const url='https://nominatim.openstreetmap.org/search?'+
    new URLSearchParams({q,format:'json',limit:1,countrycodes:'pt'});
  try{
    const r=await fetch(url,{headers:{'Accept-Language':'pt'}});
    const d=await r.json();
    if(!d.length){alert('Morada não encontrada.');return;}
    setMe(parseFloat(d[0].lat),parseFloat(d[0].lon));
  }catch(e){alert('Erro na procura.');}
}
document.getElementById('go').onclick=search;
document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')search();});
document.getElementById('close').onclick=()=>{
  document.getElementById('card').classList.remove('show');
  clearExits();
};
</script>
</body>
</html>
